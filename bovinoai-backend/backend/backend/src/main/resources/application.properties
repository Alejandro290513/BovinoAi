spring.application.name=backend

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bovinoai
spring.datasource.username=bovinoai_user
spring.datasource.password=BovinoAI2025!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=8081
spring.application.name=bovinoai-backend

# AI Configuration
ai.claude.api.key=YOUR_API_KEY_HERE
ai.claude.model=claude-3-5-sonnet-20240620

